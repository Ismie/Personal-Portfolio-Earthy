<svg width="32" height="32" viewBox="0 0 12 12" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <rect width="12" height="12" rx="2" fill="#FBF6EC"/>
  <!-- casing outline -->
  <rect x="1" y="1" width="10" height="1" fill="#241C16"/>
  <rect x="1" y="1" width="1" height="8" fill="#241C16"/>
  <rect x="10" y="1" width="1" height="8" fill="#241C16"/>
  <rect x="1" y="8" width="10" height="1" fill="#241C16"/>
  <!-- casing body (light top -> dark bottom) -->
  <rect x="2" y="2" width="8" height="2" fill="#D8895C"/>
  <rect x="2" y="4" width="8" height="2" fill="#C2613B"/>
  <rect x="2" y="6" width="8" height="2" fill="#8F4523"/>
  <!-- screen + glow -->
  <rect x="3" y="3" width="6" height="3" fill="#E7A93A"/>
  <rect x="3" y="3" width="6" height="1" fill="#F4D08A"/>
  <!-- prompt -->
  <rect x="4" y="4" width="3" height="1" fill="#3A2A16"/>
  <!-- neck + base -->
  <rect x="5" y="9" width="2" height="1" fill="#8F4523"/>
  <rect x="4" y="10" width="4" height="1" fill="#C2613B"/>
  <rect x="4" y="11" width="4" height="1" fill="#241C16"/>
</svg>
